<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Probe HTML</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .box {
      background: white;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      text-align: center;
      max-width: 500px;
    }
    h1 { margin-top: 0; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Hallo Welt 👋</h1>
    <p>Das ist eine einfache Probe-HTML-Datei.</p>
    <button onclick="alert('Button funktioniert!')">Klick mich</button>
  </div>
</body>
</html>
